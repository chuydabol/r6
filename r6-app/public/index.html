<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R6 Research Tool</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(1200px 700px at 25% -10%, rgba(98, 59, 255, 0.32), transparent 55%),
        radial-gradient(900px 500px at 85% 0%, rgba(37, 99, 235, 0.24), transparent 50%),
        linear-gradient(180deg, #04091f 0%, #070f2b 45%, #050b22 100%);
      color: #e6ecff;
      min-height: 100vh;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px;
    }

    h1, h2, h3 { margin-top: 0; }

    h1 {
      font-size: clamp(30px, 4vw, 40px);
      letter-spacing: 0.02em;
      margin-bottom: 18px;
      color: #f3f6ff;
      text-shadow: 0 8px 24px rgba(37, 99, 235, 0.35);
    }

    h2 {
      color: #d9e4ff;
      letter-spacing: 0.01em;
    }

    .card {
      background: linear-gradient(145deg, rgba(10, 20, 52, 0.95), rgba(6, 14, 39, 0.95));
      border: 1px solid rgba(120, 149, 255, 0.22);
      border-radius: 20px;
      padding: 18px;
      box-shadow: 0 14px 36px rgba(2, 8, 24, 0.55), inset 0 0 0 1px rgba(22, 40, 94, 0.38);
      backdrop-filter: blur(8px);
    }

    .section-spacing {
      margin-top: 24px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      align-items: center;
    }

    .search-box,
    select,
    input {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(125, 145, 224, 0.35);
      background: rgba(12, 24, 61, 0.82);
      color: #f8fbff;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .search-box:focus,
    select:focus,
    input:focus {
      border-color: rgba(87, 164, 255, 0.9);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
    }

    .btn {
      padding: 12px 16px;
      border: 1px solid rgba(112, 190, 255, 0.5);
      border-radius: 12px;
      background: linear-gradient(135deg, #2f65ff, #1f4fe0);
      color: white;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
    }

    .btn:hover {
      background: linear-gradient(135deg, #3f74ff, #2758f0);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-chip {
      padding: 9px 15px;
      border-radius: 999px;
      border: 1px solid rgba(115, 140, 226, 0.4);
      background: rgba(18, 31, 72, 0.88);
      color: #dce8ff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .filter-chip.active {
      background: linear-gradient(135deg, #385ffe, #6638ff);
      border-color: rgba(122, 196, 255, 0.95);
      box-shadow: 0 10px 18px rgba(56, 95, 254, 0.4);
    }

    .props-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .prop-card,
    .player-item,
    .match-item,
    .stat-box,
    .log-row,
    .detail-box,
    .search-result-item {
      background: linear-gradient(180deg, rgba(7, 19, 52, 0.96), rgba(4, 12, 35, 0.96));
      border: 1px solid rgba(108, 133, 224, 0.24);
      border-radius: 16px;
      padding: 12px;
    }

    .prop-card {
      background:
        radial-gradient(120% 120% at 90% 0%, rgba(53, 113, 255, 0.18), transparent 50%),
        linear-gradient(180deg, rgba(8, 22, 58, 0.98), rgba(4, 12, 35, 0.98));
      padding: 16px;
    }

    .prop-top,
    .match-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .player-name {
      font-size: 24px;
      font-weight: 800;
      color: #f0f5ff;
    }

    .line-badge {
      min-width: 68px;
      text-align: center;
      padding: 11px 12px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(39, 75, 211, 0.9), rgba(95, 54, 246, 0.9));
      border: 1px solid rgba(118, 206, 255, 0.65);
      color: #dff6ff;
      font-size: 23px;
      font-weight: 800;
      box-shadow: 0 10px 20px rgba(55, 95, 247, 0.4);
    }

    .muted {
      color: #9fb0d9;
      font-size: 14px;
    }

    .empty {
      padding: 18px;
      border: 1px dashed #334155;
      border-radius: 12px;
      color: #94a3b8;
      text-align: center;
    }

    .notice {
      margin-bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #111827;
      color: #cbd5e1;
      font-size: 14px;
    }

    .pill-row,
    .maps {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill,
    .map-tag,
    .status-pill {
      background: rgba(26, 45, 98, 0.9);
      color: #dbe7ff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(111, 143, 245, 0.33);
    }

    .clickable {
      cursor: pointer;
      transition: 0.2s ease;
    }

    .clickable:hover {
      border-color: rgba(115, 190, 255, 0.95);
      transform: translateY(-1px);
      box-shadow: 0 12px 26px rgba(20, 60, 183, 0.35);
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .team-header img,
    .team-search-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      background: #0f172a;
      border-radius: 12px;
      padding: 6px;
      flex-shrink: 0;
    }

    .analysis-controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
      color: #e5e7eb;
    }

    .game-log {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .hit { color: #4ade80; font-weight: bold; }
    .miss { color: #f87171; font-weight: bold; }

    .match-details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .debug-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      font-size: 13px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .team-search-results {
      display: grid;
      gap: 10px;
      margin-bottom: 18px;
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .hidden-section { display: none; }

    .player-detail-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .player-header-card {
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(118, 147, 241, 0.35);
      background: linear-gradient(180deg, rgba(10, 26, 69, 0.95), rgba(6, 17, 45, 0.95));
      margin-bottom: 14px;
    }

    @media (max-width: 900px) {
      .grid-two,
      .match-details-grid {
        grid-template-columns: 1fr;
      }

      .props-grid {
        grid-template-columns: 1fr;
      }

      .analysis-controls,
      .log-row {
        grid-template-columns: 1fr;
      }

      .search-result-item {
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>R6 PickFinder</h1>

    <div id="manualPropsCard" class="card">
      <h2>Manual Props Board</h2>

      <div class="topbar">
        <input id="playerSearch" class="search-box" placeholder="Search player or team..." />
        <button class="btn" onclick="loadPropsBoard()">Refresh Props</button>
      </div>

      <div class="toolbar">
        <button class="filter-chip active" onclick="setStatFilter('all', this)">All</button>
        <button class="filter-chip" onclick="setStatFilter('MAP 1 Kills', this)">MAP 1 Kills</button>
      </div>

      <div id="propMessage" class="notice" style="display:none;"></div>
      <div id="propsSection">
        <div class="empty">Loading props...</div>
      </div>

      <div id="debugSection" class="debug-box" style="display:none;"></div>
    </div>

    <div id="teamResearchCard" class="card section-spacing">
      <h2>Team Research Base</h2>

      <div class="topbar">
        <input
          id="teamSearchInput"
          class="search-box"
          placeholder="Search team name (example: shopify, 100 thieves, m80)"
          oninput="searchTeams()"
        />
      </div>

      <div id="teamSearchResults" class="team-search-results"></div>

      <div id="teamSection" class="card" style="margin-bottom: 20px; background:#0f172a;">
        <div class="empty">Search and select a team.</div>
      </div>

      <div class="grid-two">
        <div class="card" style="background:#0f172a;">
          <h2>Roster</h2>
          <div id="playersSection" class="list">
            <div class="empty">No roster loaded yet.</div>
          </div>
        </div>

        <div class="card" style="background:#0f172a;">
          <h2>Recent Matches</h2>
          <div id="matchesSection" class="list">
            <div class="empty">No matches loaded yet.</div>
          </div>
        </div>
      </div>
    </div>

    <div id="matchDetailsCard" class="card section-spacing">
      <h2>Match Details</h2>
      <div id="matchDetailsSection">
        <div class="empty">Click a match after loading a team.</div>
      </div>
    </div>

    <div id="playerDetailCard" class="card section-spacing">
      <h2>Player Detail</h2>
      <div id="analysisSection">
        <div class="empty">Select a player after loading a team.</div>
      </div>
    </div>
  </div>

  <script>
    const propsSection = document.getElementById("propsSection");
    const propMessage = document.getElementById("propMessage");
    const debugSection = document.getElementById("debugSection");
    const playerSearch = document.getElementById("playerSearch");

    const teamSearchInput = document.getElementById("teamSearchInput");
    const teamSearchResults = document.getElementById("teamSearchResults");

    const teamSection = document.getElementById("teamSection");
    const playersSection = document.getElementById("playersSection");
    const matchesSection = document.getElementById("matchesSection");
    const analysisSection = document.getElementById("analysisSection");
    const matchDetailsSection = document.getElementById("matchDetailsSection");
    const manualPropsCard = document.getElementById("manualPropsCard");
    const teamResearchCard = document.getElementById("teamResearchCard");
    const matchDetailsCard = document.getElementById("matchDetailsCard");

    let allProps = [];
    let visibleProps = [];
    let activeStatFilter = "all";

    let currentTeam = null;
    let currentPlayers = [];
    let currentMatches = [];
    let currentMatchDetails = null;

    let selectedPlayer = null;
    let selectedPlayerGameLog = [];
    let lastAnalyzedLine = null;

    let teamSearchDebounce = null;

    window.addEventListener("DOMContentLoaded", () => {
      loadPropsBoard();
      playerSearch.addEventListener("input", applyPropFilters);
    });

    async function loadPropsBoard() {
      propsSection.innerHTML = `<div class="empty">Loading manual PrizePicks props...</div>`;
      debugSection.style.display = "none";
      debugSection.textContent = "";

      try {
        const data = await fetchPrizePicksManual();
        allProps = Array.isArray(data.props) ? data.props : [];
        showDebug(data);
        applyPropFilters();
      } catch (err) {
        propsSection.innerHTML = `<div class="empty">Could not load props.</div>`;
        debugSection.style.display = "block";
        debugSection.textContent = err.message;
      }
    }

    async function fetchPrizePicksManual() {
      const res = await fetch("/api/prizepicks/manual");
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || `Manual PrizePicks request failed: ${res.status}`);
      }

      return data;
    }

    function setStatFilter(filterValue, button) {
      activeStatFilter = filterValue;
      document.querySelectorAll(".filter-chip").forEach(chip => chip.classList.remove("active"));
      button.classList.add("active");
      applyPropFilters();
    }

    function applyPropFilters() {
      const searchValue = normalizeName(playerSearch.value);
      let filtered = [...allProps];

      if (currentTeam?.name) {
        const normalizedCurrentTeam = normalizeName(currentTeam.name);
        filtered = filtered.filter(prop => normalizeName(prop.teamName) === normalizedCurrentTeam);
      }

      if (activeStatFilter !== "all") {
        filtered = filtered.filter(prop => prop.statType === activeStatFilter);
      }

      if (searchValue) {
        filtered = filtered.filter(prop => {
          const player = normalizeName(prop.playerName);
          const team = normalizeName(prop.teamName);
          const matchup = normalizeName(getMatchupText(prop));
          return player.includes(searchValue) || team.includes(searchValue) || matchup.includes(searchValue);
        });
      }

      visibleProps = filtered;
      renderAllProps(filtered);
    }

    function renderAllProps(props) {
      if (!props.length) {
        propsSection.innerHTML = `<div class="empty">No props found.</div>`;
        return;
      }

      propsSection.innerHTML = `
        <div class="props-grid">
          ${props.map((prop, index) => {
            const time = formatDate(prop.startTime);
            const matchup = getMatchupText(prop);
            return `
              <div class="prop-card clickable" onclick="handlePropCardClick(${index})">
                <div class="prop-top">
                  <div>
                    <div class="player-name">${escapeHtml(prop.playerName || "Unknown Player")}</div>
                    <div class="muted">${escapeHtml(prop.teamName || "Unknown Team")}</div>
                  </div>
                  <div class="line-badge">${prop.lineScore ?? "N/A"}</div>
                </div>

                <div style="font-size:18px; font-weight:bold; margin-bottom:6px;">${escapeHtml(prop.statType || "Unknown Stat")}</div>

                <div class="muted">Matchup: ${escapeHtml(matchup)}</div>
                <div class="muted">Time: ${escapeHtml(time)}</div>
                <div class="muted">Description: ${escapeHtml(prop.description || "N/A")}</div>

                <div class="pill-row">
                  <span class="pill">${escapeHtml(prop.projectionType || "Projection")}</span>
                  <span class="pill">${escapeHtml(prop.status || "unknown")}</span>
                  ${prop.durationName ? `<span class="pill">${escapeHtml(prop.durationName)}</span>` : ""}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    async function handlePropCardClick(visibleIndex) {
      const prop = visibleProps[visibleIndex];
      if (!prop) return;

      if (!currentTeam) {
        showPropMessage("Load a BO3 team first, then click a prop to open player analysis.");
        return;
      }

      const matchingPlayer = findMatchingTeamPlayer(prop);
      if (!matchingPlayer) {
        showPropMessage(`No BO3 player match found for ${prop.playerName} on ${currentTeam.name}.`);
        return;
      }

      hidePropMessage();
      await selectPlayer(matchingPlayer.id);

      const lineInput = document.getElementById("lineInput");
      const statSelect = document.getElementById("statSelect");

      if (!lineInput) {
        showPropMessage("Could not open the player analysis panel.");
        return;
      }

      lineInput.value = prop.lineScore ?? "";

      if (statSelect && isKillsStat(prop.statType)) {
        statSelect.value = "kills";
      }

      runAnalysis();
    }

    function findMatchingTeamPlayer(prop) {
      if (!currentTeam?.name) return null;

      const propTeam = normalizeName(prop.teamName);
      const currentTeamName = normalizeName(currentTeam.name);
      if (propTeam !== currentTeamName) return null;

      const normalizedPropPlayer = normalizeName(prop.playerName);
      const nicknameMatch = currentPlayers.find(player =>
        normalizeName(player.nickname) === normalizedPropPlayer
      );
      if (nicknameMatch) return nicknameMatch;

      return currentPlayers.find(player => {
        const fullName = normalizeName(`${player.first_name || ""}${player.last_name || ""}`);
        return fullName && fullName === normalizedPropPlayer;
      }) || null;
    }

    function isKillsStat(statType) {
      return String(statType || "").toLowerCase().includes("kill");
    }

    function showPropMessage(message) {
      propMessage.style.display = "block";
      propMessage.textContent = message;
    }

    function hidePropMessage() {
      propMessage.style.display = "none";
      propMessage.textContent = "";
    }

    function showDebug(data) {
      debugSection.style.display = "block";
      debugSection.textContent = JSON.stringify({
        count: data.count,
        firstProp: data.firstProp || null
      }, null, 2);
    }

    function getMatchupText(prop) {
      if (prop.homeTeam && prop.awayTeam) {
        return `${prop.homeTeam} vs ${prop.awayTeam}`;
      }
      return "Unknown matchup";
    }

    function searchTeams() {
      clearTimeout(teamSearchDebounce);

      teamSearchDebounce = setTimeout(async () => {
        const query = teamSearchInput.value.trim();

        if (!query) {
          teamSearchResults.innerHTML = "";
          return;
        }

        teamSearchResults.innerHTML = `<div class="empty">Searching teams...</div>`;

        try {
          const res = await fetch(`/api/team-search?q=${encodeURIComponent(query)}`);
          const data = await res.json();
          const results = data.results || [];

          if (!results.length) {
            teamSearchResults.innerHTML = `<div class="empty">No teams found.</div>`;
            return;
          }

          teamSearchResults.innerHTML = results.map(team => `
            <div class="search-result-item clickable" onclick="loadTeamFromSearch('${escapeJs(team.slug || "")}')">
              <img class="team-search-logo" src="${escapeHtml(team.image_url || "")}" alt="${escapeHtml(team.name || "Team")} logo" />
              <div>
                <strong>${escapeHtml(team.name || "Unknown Team")}</strong>
                <div class="muted">Slug: ${escapeHtml(team.slug || "N/A")}</div>
                <div class="muted">Team ID: ${team.id ?? "N/A"}</div>
              </div>
            </div>
          `).join("");
        } catch (err) {
          console.error(err);
          teamSearchResults.innerHTML = `<div class="empty">Failed to search teams.</div>`;
        }
      }, 250);
    }

    async function loadTeamFromSearch(slug) {
      if (!slug) return;

      teamSearchInput.value = "";
      teamSearchResults.innerHTML = "";

      await loadTeamBaseFromSlug(slug);
    }

    async function loadTeamBaseFromSlug(slug) {
      teamSection.innerHTML = `<div class="muted">Loading team...</div>`;
      playersSection.innerHTML = `<div class="muted">Loading roster...</div>`;
      matchesSection.innerHTML = `<div class="muted">Loading matches...</div>`;
      analysisSection.innerHTML = `<div class="empty">Select a player after loading a team.</div>`;
      matchDetailsSection.innerHTML = `<div class="empty">Click a match after loading a team.</div>`;

      try {
        const team = await fetchTeam(slug);
        currentTeam = team;
        currentPlayers = team.players || [];
        currentMatches = [];
        currentMatchDetails = null;
        selectedPlayer = null;
        selectedPlayerGameLog = [];
        hidePropMessage();

        renderTeam(team);
        renderPlayers(currentPlayers);
        applyPropFilters();

        const matches = await fetchTeamMatches(team.id);
        currentMatches = matches;
        renderMatches(matches);
      } catch (err) {
        console.error(err);
        teamSection.innerHTML = `<div class="empty">Failed to load team data.</div>`;
        playersSection.innerHTML = `<div class="empty">Could not load roster.</div>`;
        matchesSection.innerHTML = `<div class="empty">Could not load matches.</div>`;
      }
    }

    async function fetchTeam(slug) {
      const res = await fetch(`/api/team/${slug}`);
      if (!res.ok) throw new Error(`Team request failed: ${res.status}`);
      return await res.json();
    }

    async function fetchTeamMatches(teamId) {
      const res = await fetch(`/api/team-matches/${teamId}`);
      if (!res.ok) throw new Error(`Matches request failed: ${res.status}`);
      const data = await res.json();
      return data.results || data.data || [];
    }

    async function fetchMatchDetails(slug) {
      const res = await fetch(`/api/match-details/${slug}`);
      if (!res.ok) throw new Error(`Match details request failed: ${res.status}`);
      return await res.json();
    }

    async function fetchMatchPlayerStats(matchId) {
      const res = await fetch(`/api/match-player-stats/${matchId}`);
      if (!res.ok) throw new Error(`Player stats request failed: ${res.status}`);
      return await res.json();
    }

    function renderTeam(team) {
      const country = team.country?.name || "Unknown country";
      const acronym = team.acronym ? `(${team.acronym})` : "";
      const logo = team.image_url || "";

      teamSection.innerHTML = `
        <div class="team-header">
          <img src="${logo}" alt="${escapeHtml(team.name || "Team")} logo" />
          <div>
            <h2 style="margin:0;">${escapeHtml(team.name || "Unknown Team")} ${escapeHtml(acronym)}</h2>
            <div class="muted">Team ID: ${team.id ?? "N/A"}</div>
            <div class="muted">Country: ${escapeHtml(country)}</div>
            <div class="muted">Slug: ${escapeHtml(team.slug || "N/A")}</div>
          </div>
        </div>
      `;
    }

    function renderPlayers(players) {
      if (!players.length) {
        playersSection.innerHTML = `<div class="empty">No players found.</div>`;
        return;
      }

      playersSection.innerHTML = players.map(player => {
        const role = player.is_coach ? "Coach" : "Player";
        const country = player.country?.name || "Unknown";

        return `
          <div class="player-item clickable" onclick="selectPlayer(${player.id})">
            <strong>${escapeHtml(player.nickname || "Unknown")}</strong>
            <div class="muted">${escapeHtml(role)}</div>
            <div class="muted">Player ID: ${player.id ?? "N/A"}</div>
            <div class="muted">Country: ${escapeHtml(country)}</div>
          </div>
        `;
      }).join("");
    }

    function renderMatches(matches) {
      if (!matches.length) {
        matchesSection.innerHTML = `<div class="empty">No matches found.</div>`;
        return;
      }

      matchesSection.innerHTML = matches.map(match => {
        const team1 = match.team1?.name || "Team 1";
        const team2 = match.team2?.name || "Team 2";
        const date = formatDate(match.start_date);
        const maps = Array.isArray(match.r6siege_games)
          ? [...new Set(
              match.r6siege_games
                .map(game => game.r6siege_map?.name?.trim())
                .filter(Boolean)
            )]
          : [];

        return `
          <div class="match-item">
            <div class="match-top">
              <strong>${escapeHtml(team1)} vs ${escapeHtml(team2)}</strong>
              <span class="status-pill">${escapeHtml(match.status || "unknown")}</span>
            </div>

            <div class="muted">Match ID: ${match.id ?? "N/A"}</div>
            <div class="muted">Date: ${escapeHtml(date)}</div>
            <div class="muted">Score: ${match.team1_score ?? "-"} - ${match.team2_score ?? "-"}</div>

            <div class="maps">
              ${maps.length
                ? maps.map(map => `<span class="map-tag">${escapeHtml(map)}</span>`).join("")
                : `<span class="map-tag">No map data</span>`}
            </div>

            <div style="margin-top:10px;">
              <button class="btn" onclick="loadMatchDetails('${escapeJs(match.slug || "")}')">Open Match</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadMatchDetails(slug) {
      if (!slug) return;

      matchDetailsSection.innerHTML = `<div class="empty">Loading match details...</div>`;

      try {
        const data = await fetchMatchDetails(slug);
        currentMatchDetails = data;
        renderMatchDetails(data);
      } catch (err) {
        console.error(err);
        matchDetailsSection.innerHTML = `<div class="empty">Could not load match details.</div>`;
      }
    }

    function renderMatchDetails(match) {
      const team1 = match.team1?.name || "Team 1";
      const team2 = match.team2?.name || "Team 2";
      const date = formatDate(match.start_date);
      const winnerId = match.winner_team_id;

      const mapList = Array.isArray(match.r6siege_games) ? match.r6siege_games : [];
      const insights = Array.isArray(match.localized_match_insights) ? match.localized_match_insights : [];

      matchDetailsSection.innerHTML = `
        <div class="detail-box">
          <div class="match-top">
            <div>
              <h3 style="margin:0;">${escapeHtml(team1)} vs ${escapeHtml(team2)}</h3>
              <div class="muted">Slug: ${escapeHtml(match.slug || "N/A")}</div>
            </div>
            <span class="status-pill">${escapeHtml(match.status || "unknown")}</span>
          </div>

          <div class="muted">Date: ${escapeHtml(date)}</div>
          <div class="muted">BO Type: ${match.bo_type ?? "N/A"}</div>
          <div class="muted">Score: ${match.team1_score ?? "-"} - ${match.team2_score ?? "-"}</div>
          <div class="muted">Winner: ${winnerId === match.team1?.id ? escapeHtml(team1) : winnerId === match.team2?.id ? escapeHtml(team2) : "Unknown"}</div>

          <div class="match-details-grid">
            <div class="detail-box">
              <h3 style="margin-bottom:10px;">Maps</h3>
              ${mapList.length ? mapList.map(game => `
                <div style="margin-bottom:10px;">
                  <div><strong>Map ${game.game_number ?? "?"}</strong>: ${escapeHtml(game.r6siege_map?.name?.trim() || "Unknown")}</div>
                  <div class="muted">Score: ${game.winner_score ?? "-"} - ${game.loser_score ?? "-"}</div>
                  <div class="muted">Status: ${escapeHtml(game.status || "unknown")}</div>
                </div>
              `).join("") : `<div class="muted">No map data.</div>`}
            </div>

            <div class="detail-box">
              <h3 style="margin-bottom:10px;">Tournament</h3>
              <div class="muted">Name: ${escapeHtml(match.tournament?.name || "Unknown")}</div>
              <div class="muted">Stage: ${escapeHtml(match.stage?.title || "Unknown")}</div>
              <div class="muted">Tier: ${escapeHtml(match.tournament?.tier || "Unknown")}</div>
              <div class="muted">Event status: ${escapeHtml(match.tournament?.status || "Unknown")}</div>
            </div>
          </div>

          <div class="match-details-grid" style="margin-top:16px;">
            <div class="detail-box">
              <h3 style="margin-bottom:10px;">${escapeHtml(team1)} Players</h3>
              ${Array.isArray(match.team1?.players) && match.team1.players.length
                ? match.team1.players.map(player => `<div class="muted">${escapeHtml(player.nickname || "Unknown")}</div>`).join("")
                : `<div class="muted">No players found.</div>`}
            </div>

            <div class="detail-box">
              <h3 style="margin-bottom:10px;">${escapeHtml(team2)} Players</h3>
              ${Array.isArray(match.team2?.players) && match.team2.players.length
                ? match.team2.players.map(player => `<div class="muted">${escapeHtml(player.nickname || "Unknown")}</div>`).join("")
                : `<div class="muted">No players found.</div>`}
            </div>
          </div>

          <div class="detail-box" style="margin-top:16px;">
            <h3 style="margin-bottom:10px;">AI Prediction</h3>
            <div class="muted">Predicted score: ${match.ai_predictions?.prediction_team1_score ?? "-"} - ${match.ai_predictions?.prediction_team2_score ?? "-"}</div>
            <div class="muted">Predicted winner ID: ${match.ai_predictions?.prediction_winner_team_id ?? "N/A"}</div>
          </div>

          <div class="detail-box" style="margin-top:16px;">
            <h3 style="margin-bottom:10px;">Insights</h3>
            ${
              insights.length
                ? insights.map(item => {
                    const body = item.body || {};
                    return `
                      <div style="margin-bottom:14px;">
                        <div><strong>${escapeHtml(body.team_1?.name || "Team 1")}</strong></div>
                        ${(body.team_1?.key_facts || []).map(f => `<div class="muted">• ${escapeHtml(f.fact || "")}</div>`).join("")}
                        <div style="margin-top:10px;"><strong>${escapeHtml(body.team_2?.name || "Team 2")}</strong></div>
                        ${(body.team_2?.key_facts || []).map(f => `<div class="muted">• ${escapeHtml(f.fact || "")}</div>`).join("")}
                      </div>
                    `;
                  }).join("")
                : `<div class="muted">No insights found.</div>`
            }
          </div>
        </div>
      `;
    }

    async function selectPlayer(playerId) {
      const player = currentPlayers.find(p => p.id === playerId);

      if (!player) {
        analysisSection.innerHTML = `<div class="empty">Player not found.</div>`;
        return;
      }

      selectedPlayer = player;
      lastAnalyzedLine = null;
      setPlayerDetailMode(true);
      analysisSection.innerHTML = `<div class="empty">Loading player data...</div>`;

      try {
        selectedPlayerGameLog = await buildPlayerGameLog(player.id);
        renderPlayerAnalysis();
      } catch (err) {
        console.error(err);
        analysisSection.innerHTML = `<div class="empty">Failed to load player game log.</div>`;
      }
    }

    function closePlayerDetail() {
      selectedPlayer = null;
      selectedPlayerGameLog = [];
      lastAnalyzedLine = null;
      setPlayerDetailMode(false);
      renderPlayerAnalysis();
    }

    function setPlayerDetailMode(isOpen) {
      [manualPropsCard, teamResearchCard, matchDetailsCard].forEach(section => {
        section.classList.toggle("hidden-section", isOpen);
      });
    }

    async function buildPlayerGameLog(playerId) {
      const finishedMatches = currentMatches
        .filter(match => match.status === "finished")
        .slice(0, 10);

      const logs = [];

      for (const match of finishedMatches) {
        const statsData = await fetchMatchPlayerStats(match.id);
        const games = Array.isArray(statsData) ? statsData : [];

        for (const game of games) {
          const playerRow = (game.r6siege_game_players || []).find(
            p => p.player_id === playerId
          );

          if (!playerRow) continue;

          const opponentName =
            match.team1?.id === currentTeam.id
              ? match.team2?.name || "Unknown"
              : match.team1?.name || "Unknown";

          logs.push({
            matchId: match.id,
            matchSlug: match.slug,
            date: formatDate(match.start_date),
            opponent: opponentName,
            map: game.r6siege_map?.name?.trim() || "Unknown",
            gameNumber: game.game_number,
            kills: playerRow.kills ?? 0,
            deaths: playerRow.death ?? 0,
            firstKill: playerRow.first_kill ?? 0,
            firstDeath: playerRow.first_death ?? 0,
            kost: playerRow.kost ?? null,
            headshotPercent: playerRow.headshots_percent ?? null
          });
        }
      }

      return logs;
    }

    function renderPlayerAnalysis() {
      if (!selectedPlayer) {
        setPlayerDetailMode(false);
        analysisSection.innerHTML = `<div class="empty">Select a player after loading a team.</div>`;
        return;
      }

      analysisSection.innerHTML = `
        <div>
          <div class="player-detail-topbar">
            <button class="btn" onclick="closePlayerDetail()">Back</button>
            <div class="muted">Player Detail View</div>
          </div>

          <div class="player-header-card">
            <h3 style="margin:0 0 6px 0;">${escapeHtml(selectedPlayer.nickname || "Unknown Player")}</h3>
            <div class="muted">${escapeHtml(currentTeam?.name || "Unknown Team")}</div>
            <div class="muted" style="margin-top:6px;">Loaded games: ${selectedPlayerGameLog.length}</div>
          </div>

          <div class="analysis-controls">
            <input id="lineInput" type="number" step="0.5" placeholder="Enter line (example 8.5)" />
            <select id="statSelect">
              <option value="kills">Kills</option>
            </select>
            <button class="btn" onclick="runAnalysis()">Analyze</button>
          </div>

          <div id="analysisOutput" style="margin-top:16px;">
            <div class="analysis-grid">
              <div class="stat-box">
                <div class="stat-label">Line</div>
                <div class="stat-value">-</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">L5 Avg</div>
                <div class="stat-value">-</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">L10 Avg</div>
                <div class="stat-value">-</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">L5 Over Hit Rate</div>
                <div class="stat-value">-</div>
              </div>
              <div class="stat-box">
                <div class="stat-label">L10 Over Hit Rate</div>
                <div class="stat-value">-</div>
              </div>
            </div>
          </div>

          <div id="analysisGameLog" class="game-log">
            <div class="empty">Run Analyze to score each game as over/under.</div>
          </div>
        </div>
      `;

      if (selectedPlayerGameLog.length) {
        renderGameLog(lastAnalyzedLine);
      }
    }

    function runAnalysis() {
      const line = parseFloat(document.getElementById("lineInput").value);

      if (Number.isNaN(line)) {
        document.getElementById("analysisOutput").innerHTML = `<div class="empty">Enter a valid line first.</div>`;
        return;
      }

      if (!selectedPlayerGameLog.length) {
        document.getElementById("analysisOutput").innerHTML = `<div class="empty">No game log available for this player yet.</div>`;
        return;
      }

      const values = selectedPlayerGameLog.map(game => game.kills);
      const l5 = values.slice(0, 5);
      const l10 = values.slice(0, 10);

      const l5Avg = calcAverage(l5);
      const l10Avg = calcAverage(l10);
      const l5Over = calcHitRate(l5, line);
      const l10Over = calcHitRate(l10, line);

      lastAnalyzedLine = line;

      document.getElementById("analysisOutput").innerHTML = `
        <div class="analysis-grid">
          <div class="stat-box">
            <div class="stat-label">Line</div>
            <div class="stat-value">${line}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L5 Avg</div>
            <div class="stat-value">${l5Avg.toFixed(2)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L10 Avg</div>
            <div class="stat-value">${l10Avg.toFixed(2)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L5 Over Hit Rate</div>
            <div class="stat-value">${l5Over.toFixed(1)}%</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L10 Over Hit Rate</div>
            <div class="stat-value">${l10Over.toFixed(1)}%</div>
          </div>
        </div>
      `;

      renderGameLog(line);
    }

    function renderGameLog(line = null) {
      const gameLogSection = document.getElementById("analysisGameLog");

      if (!selectedPlayerGameLog.length) {
        gameLogSection.innerHTML = `<div class="empty">No recent game logs found for this player.</div>`;
        return;
      }

      gameLogSection.innerHTML = selectedPlayerGameLog.map(game => {
        const hasLine = typeof line === "number";
        const hit = hasLine ? game.kills > line : false;
        return `
          <div class="log-row">
            <div>${escapeHtml(game.opponent)}</div>
            <div>${escapeHtml(game.date)}</div>
            <div>Kills: <strong>${game.kills}</strong></div>
            <div>Map: ${escapeHtml(game.map)}</div>
            <div class="${hasLine ? (hit ? "hit" : "miss") : "muted"}">${hasLine ? (hit ? "OVER" : "UNDER") : "No line"}</div>
          </div>
        `;
      }).join("");
    }

    function calcAverage(arr) {
      if (!arr.length) return 0;
      return arr.reduce((sum, value) => sum + value, 0) / arr.length;
    }

    function calcHitRate(arr, line) {
      if (!arr.length) return 0;
      const hits = arr.filter(value => value > line).length;
      return (hits / arr.length) * 100;
    }

    function formatDate(dateString) {
      if (!dateString) return "Unknown date";
      const d = new Date(dateString);
      if (Number.isNaN(d.getTime())) return dateString;
      return d.toLocaleString();
    }

    function normalizeName(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
    }
  </script>
</body>
</html>
