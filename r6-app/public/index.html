<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>R6 Research Tool</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }

    .app {
      max-width: 1450px;
      margin: 0 auto;
      padding: 24px;
    }

    h1, h2, h3 { margin-top: 0; }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    }

    .section-spacing {
      margin-top: 24px;
    }

    .topbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
      align-items: center;
    }

    .search-box,
    select,
    input {
      flex: 1;
      min-width: 220px;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #111827;
      color: white;
      outline: none;
    }

    .btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .btn:hover {
      background: #1d4ed8;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .filter-chip {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e5e7eb;
      cursor: pointer;
      font-size: 14px;
    }

    .filter-chip.active {
      background: #1d4ed8;
      border-color: #3b82f6;
    }

    .props-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    .prop-card,
    .player-item,
    .match-item,
    .stat-box,
    .log-row,
    .detail-box {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 12px;
    }

    .prop-card {
      background: linear-gradient(180deg, #0f172a 0%, #0b1227 100%);
      padding: 14px;
    }

    .prop-top,
    .match-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .player-name {
      font-size: 20px;
      font-weight: bold;
    }

    .line-badge {
      min-width: 64px;
      text-align: center;
      padding: 10px 12px;
      border-radius: 12px;
      background: #172554;
      color: #93c5fd;
      font-size: 22px;
      font-weight: bold;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    .empty {
      padding: 18px;
      border: 1px dashed #334155;
      border-radius: 12px;
      color: #94a3b8;
      text-align: center;
    }

    .pill-row,
    .maps {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .pill,
    .map-tag,
    .status-pill {
      background: #1e293b;
      color: #cbd5e1;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
    }

    .clickable {
      cursor: pointer;
      transition: 0.2s ease;
    }

    .clickable:hover {
      border-color: #3b82f6;
      transform: translateY(-1px);
    }

    .grid-two {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .team-header img {
      width: 56px;
      height: 56px;
      object-fit: contain;
      background: #0f172a;
      border-radius: 12px;
      padding: 6px;
    }

    .analysis-controls {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .stat-label {
      color: #94a3b8;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: bold;
      color: #e5e7eb;
    }

    .game-log {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .hit { color: #4ade80; font-weight: bold; }
    .miss { color: #f87171; font-weight: bold; }

    .match-details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }

    .debug-box {
      margin-top: 16px;
      padding: 12px;
      border-radius: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      font-size: 13px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 900px) {
      .grid-two,
      .match-details-grid {
        grid-template-columns: 1fr;
      }

      .props-grid {
        grid-template-columns: 1fr;
      }

      .analysis-controls,
      .log-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>R6 Research Tool</h1>

    <div class="card">
      <h2>Manual Props Board</h2>

      <div class="topbar">
        <input id="playerSearch" class="search-box" placeholder="Search player or team..." />
        <button class="btn" onclick="loadPropsBoard()">Refresh Props</button>
      </div>

      <div class="toolbar">
        <button class="filter-chip active" onclick="setStatFilter('all', this)">All</button>
        <button class="filter-chip" onclick="setStatFilter('MAP 1 Kills', this)">MAP 1 Kills</button>
      </div>

      <div id="propsSection">
        <div class="empty">Loading props...</div>
      </div>

      <div id="debugSection" class="debug-box" style="display:none;"></div>
    </div>

    <div class="card section-spacing">
      <h2>Team Research Base</h2>

      <div class="topbar">
        <input
          id="teamSlug"
          class="search-box"
          placeholder="Enter team slug (example: shopify-rebellion-r6)"
          value="shopify-rebellion-r6"
        />
        <button class="btn" onclick="loadTeamBase()">Load Team</button>
      </div>

      <div id="teamSection" class="card" style="margin-bottom: 20px; background:#0f172a;">
        <div class="empty">Load a team to begin.</div>
      </div>

      <div class="grid-two">
        <div class="card" style="background:#0f172a;">
          <h2>Roster</h2>
          <div id="playersSection" class="list">
            <div class="empty">No roster loaded yet.</div>
          </div>
        </div>

        <div class="card" style="background:#0f172a;">
          <h2>Recent Matches</h2>
          <div id="matchesSection" class="list">
            <div class="empty">No matches loaded yet.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card section-spacing">
      <h2>Match Details</h2>
      <div id="matchDetailsSection">
        <div class="empty">Click a match after loading a team.</div>
      </div>
    </div>

    <div class="card section-spacing">
      <h2>Player Analysis</h2>
      <div id="analysisSection">
        <div class="empty">Select a player after loading a team.</div>
      </div>
    </div>
  </div>

  <script>
    const propsSection = document.getElementById("propsSection");
    const debugSection = document.getElementById("debugSection");
    const playerSearch = document.getElementById("playerSearch");

    const teamSection = document.getElementById("teamSection");
    const playersSection = document.getElementById("playersSection");
    const matchesSection = document.getElementById("matchesSection");
    const analysisSection = document.getElementById("analysisSection");
    const matchDetailsSection = document.getElementById("matchDetailsSection");

    let allProps = [];
    let activeStatFilter = "all";

    let currentTeam = null;
    let currentPlayers = [];
    let currentMatches = [];
    let currentMatchDetails = null;

    let selectedPlayer = null;
    let selectedPlayerGameLog = [];

    window.addEventListener("DOMContentLoaded", () => {
      loadPropsBoard();
      playerSearch.addEventListener("input", applyPropFilters);
    });

    async function loadPropsBoard() {
      propsSection.innerHTML = `<div class="empty">Loading manual PrizePicks props...</div>`;
      debugSection.style.display = "none";
      debugSection.textContent = "";

      try {
        const data = await fetchPrizePicksManual();
        allProps = Array.isArray(data.props) ? data.props : [];
        showDebug(data);
        applyPropFilters();
      } catch (err) {
        propsSection.innerHTML = `<div class="empty">Could not load props.</div>`;
        debugSection.style.display = "block";
        debugSection.textContent = err.message;
      }
    }

    async function fetchPrizePicksManual() {
      const res = await fetch("/api/prizepicks/manual");
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.message || `Manual PrizePicks request failed: ${res.status}`);
      }

      return data;
    }

    function setStatFilter(filterValue, button) {
      activeStatFilter = filterValue;
      document.querySelectorAll(".filter-chip").forEach(chip => chip.classList.remove("active"));
      button.classList.add("active");
      applyPropFilters();
    }

    function applyPropFilters() {
      const searchValue = normalizeName(playerSearch.value);
      let filtered = [...allProps];

      if (activeStatFilter !== "all") {
        filtered = filtered.filter(prop => prop.statType === activeStatFilter);
      }

      if (searchValue) {
        filtered = filtered.filter(prop => {
          const player = normalizeName(prop.playerName);
          const team = normalizeName(prop.teamName);
          const matchup = normalizeName(getMatchupText(prop));
          return player.includes(searchValue) || team.includes(searchValue) || matchup.includes(searchValue);
        });
      }

      renderAllProps(filtered);
    }

    function renderAllProps(props) {
      if (!props.length) {
        propsSection.innerHTML = `<div class="empty">No props found.</div>`;
        return;
      }

      propsSection.innerHTML = `
        <div class="props-grid">
          ${props.map(prop => {
            const time = formatDate(prop.startTime);
            const matchup = getMatchupText(prop);
            return `
              <div class="prop-card">
                <div class="prop-top">
                  <div>
                    <div class="player-name">${escapeHtml(prop.playerName || "Unknown Player")}</div>
                    <div class="muted">${escapeHtml(prop.teamName || "Unknown Team")}</div>
                  </div>
                  <div class="line-badge">${prop.lineScore ?? "N/A"}</div>
                </div>

                <div style="font-size:18px; font-weight:bold; margin-bottom:6px;">${escapeHtml(prop.statType || "Unknown Stat")}</div>

                <div class="muted">Matchup: ${escapeHtml(matchup)}</div>
                <div class="muted">Time: ${escapeHtml(time)}</div>
                <div class="muted">Description: ${escapeHtml(prop.description || "N/A")}</div>

                <div class="pill-row">
                  <span class="pill">${escapeHtml(prop.projectionType || "Projection")}</span>
                  <span class="pill">${escapeHtml(prop.status || "unknown")}</span>
                  ${prop.durationName ? `<span class="pill">${escapeHtml(prop.durationName)}</span>` : ""}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function showDebug(data) {
      debugSection.style.display = "block";
      debugSection.textContent = JSON.stringify({
        count: data.count,
        firstProp: data.firstProp || null
      }, null, 2);
    }

    function getMatchupText(prop) {
      if (prop.homeTeam && prop.awayTeam) {
        return `${prop.homeTeam} vs ${prop.awayTeam}`;
      }
      return "Unknown matchup";
    }

    async function loadTeamBase() {
      const slug = document.getElementById("teamSlug").value.trim();

      if (!slug) {
        alert("Enter a team slug first.");
        return;
      }

      teamSection.innerHTML = `<div class="muted">Loading team...</div>`;
      playersSection.innerHTML = `<div class="muted">Loading roster...</div>`;
      matchesSection.innerHTML = `<div class="muted">Loading matches...</div>`;
      analysisSection.innerHTML = `<div class="empty">Select a player after loading a team.</div>`;
      matchDetailsSection.innerHTML = `<div class="empty">Click a match after loading a team.</div>`;

      try {
        const team = await fetchTeam(slug);
        currentTeam = team;
        currentPlayers = team.players || [];
        renderTeam(team);
        renderPlayers(currentPlayers);

        const matches = await fetchTeamMatches(team.id);
        currentMatches = matches;
        renderMatches(matches);
      } catch (err) {
        console.error(err);
        teamSection.innerHTML = `<div class="empty">Failed to load team data.</div>`;
        playersSection.innerHTML = `<div class="empty">Could not load roster.</div>`;
        matchesSection.innerHTML = `<div class="empty">Could not load matches.</div>`;
      }
    }

    async function fetchTeam(slug) {
      const res = await fetch(`/api/team/${slug}`);
      if (!res.ok) throw new Error(`Team request failed: ${res.status}`);
      return await res.json();
    }

    async function fetchTeamMatches(teamId) {
      const res = await fetch(`/api/team-matches/${teamId}`);
      if (!res.ok) throw new Error(`Matches request failed: ${res.status}`);
      const data = await res.json();
      return data.results || data.data || [];
    }

    async function fetchMatchDetails(slug) {
      const res = await fetch(`/api/match-details/${slug}`);
      if (!res.ok) throw new Error(`Match details request failed: ${res.status}`);
      return await res.json();
    }

    function renderTeam(team) {
      const country = team.country?.name || "Unknown country";
      const acronym = team.acronym ? `(${team.acronym})` : "";
      const logo = team.image_url || "";

      teamSection.innerHTML = `
        <div class="team-header">
          <img src="${logo}" alt="${escapeHtml(team.name || "Team")} logo" />
          <div>
            <h2 style="margin:0;">${escapeHtml(team.name || "Unknown Team")} ${escapeHtml(acronym)}</h2>
            <div class="muted">Team ID: ${team.id ?? "N/A"}</div>
            <div class="muted">Country: ${escapeHtml(country)}</div>
            <div class="muted">Slug: ${escapeHtml(team.slug || "N/A")}</div>
          </div>
        </div>
      `;
    }

    function renderPlayers(players) {
      if (!players.length) {
        playersSection.innerHTML = `<div class="empty">No players found.</div>`;
        return;
      }

      playersSection.innerHTML = players.map(player => {
        const role = player.is_coach ? "Coach" : "Player";
        const country = player.country?.name || "Unknown";

        return `
          <div class="player-item clickable" onclick="selectPlayer(${player.id})">
            <strong>${escapeHtml(player.nickname || "Unknown")}</strong>
            <div class="muted">${escapeHtml(role)}</div>
            <div class="muted">Player ID: ${player.id ?? "N/A"}</div>
            <div class="muted">Country: ${escapeHtml(country)}</div>
          </div>
        `;
      }).join("");
    }

    function renderMatches(matches) {
      if (!matches.length) {
        matchesSection.innerHTML = `<div class="empty">No matches found.</div>`;
        return;
      }

      matchesSection.innerHTML = matches.map(match => {
        const team1 = match.team1?.name || "Team 1";
        const team2 = match.team2?.name || "Team 2";
        const date = formatDate(match.start_date);
        const maps = Array.isArray(match.r6siege_games)
          ? [...new Set(
              match.r6siege_games
                .map(game => game.r6siege_map?.name?.trim())
                .filter(Boolean)
            )]
          : [];

        return `
          <div class="match-item">
            <div class="match-top">
              <strong>${escapeHtml(team1)} vs ${escapeHtml(team2)}</strong>
              <span class="status-pill">${escapeHtml(match.status || "unknown")}</span>
            </div>

            <div class="muted">Match ID: ${match.id ?? "N/A"}</div>
            <div class="muted">Date: ${escapeHtml(date)}</div>
            <div class="muted">Score: ${match.team1_score ?? "-"} - ${match.team2_score ?? "-"}</div>

            <div class="maps">
              ${maps.length
                ? maps.map(map => `<span class="map-tag">${escapeHtml(map)}</span>`).join("")
                : `<span class="map-tag">No map data</span>`}
            </div>

            <div style="margin-top:10px;">
              <button class="btn" onclick="loadMatchDetails('${escapeJs(match.slug || "")}')">Open Match</button>
            </div>
          </div>
        `;
      }).join("");
    }

    async function loadMatchDetails(slug) {
      if (!slug) return;

      matchDetailsSection.innerHTML = `<div class="empty">Loading match details...</div>`;

      try {
        const data = await fetchMatchDetails(slug);
        currentMatchDetails = data;
        renderMatchDetails(data);
      } catch (err) {
        console.error(err);
        matchDetailsSection.innerHTML = `<div class="empty">Could not load match details.</div>`;
      }
    }

    function renderMatchDetails(match) {
      const team1 = match.team1?.name || "Team 1";
      const team2 = match.team2?.name || "Team 2";
      const date = formatDate(match.start_date);
      const winnerId = match.winner_team_id;

      const mapList = Array.isArray(match.r6siege_games) ? match.r6siege_games : [];
      const insights = Array.isArray(match.localized_match_insights) ? match.localized_match_insights : [];

      matchDetailsSection.innerHTML = `
        <div class="detail-box">
          <div class="match-top">
            <div>
              <h3 style="margin:0;">${escapeHtml(team1)} vs ${escapeHtml(team2)}</h3>
              <div class="muted">Slug: ${escapeHtml(match.slug || "N/A")}</div>
            </div>
            <span class="status-pill">${escapeHtml(match.status || "unknown")}</span>
          </div>

          <div class="muted">Date: ${escapeHtml(date)}</div>
          <div class="muted">BO Type: ${match.bo_type ?? "N/A"}</div>
          <div class="muted">Score: ${match.team1_score ?? "-"} - ${match.team2_score ?? "-"}</div>
          <div class="muted">Winner: ${winnerId === match.team1?.id ? escapeHtml(team1) : winnerId === match.team2?.id ? escapeHtml(team2) : "Unknown"}</div>

          <div class="match-details-grid">
            <div class="detail-box">
              <h3 style="margin-bottom:10px;">Maps</h3>
              ${mapList.length ? mapList.map(game => `
                <div style="margin-bottom:10px;">
                  <div><strong>Map ${game.game_number ?? "?"}</strong>: ${escapeHtml(game.r6siege_map?.name?.trim() || "Unknown")}</div>
                  <div class="muted">Score: ${game.winner_score ?? "-"} - ${game.loser_score ?? "-"}</div>
                  <div class="muted">Status: ${escapeHtml(game.status || "unknown")}</div>
                </div>
              `).join("") : `<div class="muted">No map data.</div>`}
            </div>

            <div class="detail-box">
              <h3 style="margin-bottom:10px;">Tournament</h3>
              <div class="muted">Name: ${escapeHtml(match.tournament?.name || "Unknown")}</div>
              <div class="muted">Stage: ${escapeHtml(match.stage?.title || "Unknown")}</div>
              <div class="muted">Tier: ${escapeHtml(match.tournament?.tier || "Unknown")}</div>
              <div class="muted">Event status: ${escapeHtml(match.tournament?.status || "Unknown")}</div>
            </div>
          </div>

          <div class="match-details-grid" style="margin-top:16px;">
            <div class="detail-box">
              <h3 style="margin-bottom:10px;">${escapeHtml(team1)} Players</h3>
              ${Array.isArray(match.team1?.players) && match.team1.players.length
                ? match.team1.players.map(player => `<div class="muted">${escapeHtml(player.nickname || "Unknown")}</div>`).join("")
                : `<div class="muted">No players found.</div>`}
            </div>

            <div class="detail-box">
              <h3 style="margin-bottom:10px;">${escapeHtml(team2)} Players</h3>
              ${Array.isArray(match.team2?.players) && match.team2.players.length
                ? match.team2.players.map(player => `<div class="muted">${escapeHtml(player.nickname || "Unknown")}</div>`).join("")
                : `<div class="muted">No players found.</div>`}
            </div>
          </div>

          <div class="detail-box" style="margin-top:16px;">
            <h3 style="margin-bottom:10px;">AI Prediction</h3>
            <div class="muted">Predicted score: ${match.ai_predictions?.prediction_team1_score ?? "-"} - ${match.ai_predictions?.prediction_team2_score ?? "-"}</div>
            <div class="muted">Predicted winner ID: ${match.ai_predictions?.prediction_winner_team_id ?? "N/A"}</div>
          </div>

          <div class="detail-box" style="margin-top:16px;">
            <h3 style="margin-bottom:10px;">Insights</h3>
            ${
              insights.length
                ? insights.map(item => {
                    const body = item.body || {};
                    return `
                      <div style="margin-bottom:14px;">
                        <div><strong>${escapeHtml(body.team_1?.name || "Team 1")}</strong></div>
                        ${(body.team_1?.key_facts || []).map(f => `<div class="muted">• ${escapeHtml(f.fact || "")}</div>`).join("")}
                        <div style="margin-top:10px;"><strong>${escapeHtml(body.team_2?.name || "Team 2")}</strong></div>
                        ${(body.team_2?.key_facts || []).map(f => `<div class="muted">• ${escapeHtml(f.fact || "")}</div>`).join("")}
                      </div>
                    `;
                  }).join("")
                : `<div class="muted">No insights found.</div>`
            }
          </div>
        </div>
      `;
    }

    function selectPlayer(playerId) {
      const player = currentPlayers.find(p => p.id === playerId);

      if (!player) {
        analysisSection.innerHTML = `<div class="empty">Player not found.</div>`;
        return;
      }

      selectedPlayer = player;
      selectedPlayerGameLog = generateMockGameLog(player);
      renderPlayerAnalysis();
    }

    function renderPlayerAnalysis() {
      if (!selectedPlayer) {
        analysisSection.innerHTML = `<div class="empty">Select a player after loading a team.</div>`;
        return;
      }

      analysisSection.innerHTML = `
        <div>
          <h3 style="margin:0 0 6px 0;">${escapeHtml(selectedPlayer.nickname || "Unknown Player")}</h3>
          <div class="muted">${escapeHtml(currentTeam?.name || "Unknown Team")}</div>

          <div class="analysis-controls">
            <input id="lineInput" type="number" step="0.5" placeholder="Enter line (example 8.5)" />
            <select id="statSelect">
              <option value="kills">Kills</option>
            </select>
            <button class="btn" onclick="runAnalysis()">Analyze</button>
          </div>

          <div id="analysisOutput" style="margin-top:16px;">
            <div class="empty">Enter a line and click Analyze.</div>
          </div>
        </div>
      `;
    }

    function runAnalysis() {
      const line = parseFloat(document.getElementById("lineInput").value);

      if (Number.isNaN(line)) {
        document.getElementById("analysisOutput").innerHTML = `<div class="empty">Enter a valid line first.</div>`;
        return;
      }

      const values = selectedPlayerGameLog.map(game => game.kills);
      const l5 = values.slice(0, 5);
      const l10 = values.slice(0, 10);

      const l5Avg = calcAverage(l5);
      const l10Avg = calcAverage(l10);
      const l5Over = calcHitRate(l5, line);
      const l10Over = calcHitRate(l10, line);

      document.getElementById("analysisOutput").innerHTML = `
        <div class="analysis-grid">
          <div class="stat-box">
            <div class="stat-label">Line</div>
            <div class="stat-value">${line}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L5 Avg</div>
            <div class="stat-value">${l5Avg.toFixed(2)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L10 Avg</div>
            <div class="stat-value">${l10Avg.toFixed(2)}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L5 Over Hit Rate</div>
            <div class="stat-value">${l5Over.toFixed(1)}%</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">L10 Over Hit Rate</div>
            <div class="stat-value">${l10Over.toFixed(1)}%</div>
          </div>
        </div>

        <div class="game-log">
          ${selectedPlayerGameLog.map(game => {
            const hit = game.kills > line;
            return `
              <div class="log-row">
                <div>${escapeHtml(game.opponent)}</div>
                <div>${escapeHtml(game.date)}</div>
                <div>Kills: <strong>${game.kills}</strong></div>
                <div>Map: ${escapeHtml(game.map)}</div>
                <div class="${hit ? "hit" : "miss"}">${hit ? "OVER" : "UNDER"}</div>
              </div>
            `;
          }).join("")}
        </div>
      `;
    }

    function calcAverage(arr) {
      if (!arr.length) return 0;
      return arr.reduce((sum, value) => sum + value, 0) / arr.length;
    }

    function calcHitRate(arr, line) {
      if (!arr.length) return 0;
      const hits = arr.filter(value => value > line).length;
      return (hits / arr.length) * 100;
    }

    function generateMockGameLog() {
      const maps = ["Bank", "Lair", "Clubhouse", "Chalet", "Kafe"];
      const opponents = ["M80", "DarkZero", "Spacestation", "Cloud9", "Oxygen", "Wildcard", "ENVY", "FURIA", "FaZe", "Team Secret"];

      return Array.from({ length: 10 }, (_, index) => ({
        opponent: opponents[index % opponents.length],
        date: new Date(Date.now() - index * 86400000 * 3).toLocaleDateString(),
        kills: Math.floor(Math.random() * 9) + 4,
        map: maps[index % maps.length]
      }));
    }

    function formatDate(dateString) {
      if (!dateString) return "Unknown date";
      const d = new Date(dateString);
      if (Number.isNaN(d.getTime())) return dateString;
      return d.toLocaleString();
    }

    function normalizeName(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/[^a-z0-9]/g, "");
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJs(value) {
      return String(value).replaceAll("\\", "\\\\").replaceAll("'", "\\'");
    }
  </script>
</body>
</html>
